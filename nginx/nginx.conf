# HTTP → HTTPS Redirect für API-Subdomain
server {
    listen 80;
    server_name server.scooldrive.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS für API-Subdomain
server {
    listen 443 ssl;
    server_name server.scooldrive.com;

    ssl_certificate /etc/letsencrypt/live/fahrschule-lg.scooldrive.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fahrschule-lg.scooldrive.com/privkey.pem;

    location / {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
