# HTTP → HTTPS Redirect
server {
    listen 80;
    server_name fahrschule-lg.scooldrive.com;

    # ACME Challenge – für Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name fahrschule-lg.scooldrive.com;

    ssl_certificate /etc/letsencrypt/live/fahrschule-lg.scooldrive.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fahrschule-lg.scooldrive.com/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    # React Router Fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Proxy → Backend Container
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
