services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    env_file: ./server/.env
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.next
    restart: unless-stopped
    env_file: ./client-next/.env.production
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    networks:
      - app-network

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
    networks:
      - app-network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    command: >
      certonly --webroot -w /var/www/certbot
      -d fahrschule-lg.scooldrive.com
      -d server.scooldrive.com
      --email farhatbashar16@gmail.com
      --agree-tos --no-eff-email

networks:
  app-network:
    driver: bridge

volumes:
  certbot-certs:
  certbot-www:
